<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>TradeWind Market — Coming Soon</title>
  <meta name="description" content="The privacy-first P2P marketplace. Coming soon." />
  <meta property="og:title" content="TradeWind Market — Coming Soon" />
  <meta property="og:description" content="Buy and sell with crypto. No accounts. No surveillance." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark-950: #09090B;
      --dark-900: #0F0F12;
      --dark-800: #17171C;
      --dark-700: #222228;
      --dark-600: #2E2E36;
      --dark-500: #3F3F48;
      --dark-400: #62626D;
      --dark-300: #8C8C96;
      --dark-200: #B5B5BD;
      --dark-100: #DCDCE0;

      --brand:     #E8553A;
      --brand-400: #F2724A;
      --brand-600: #D04328;
      --brand-300: #F5956E;

      --border:    rgba(255,255,255,0.06);
      --border-h:  rgba(255,255,255,0.10);

      /* Flip card dimensions */
      --card-w: 64px;
      --card-h: 88px;
      --card-font: 3rem;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--dark-950);
      color: var(--dark-100);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── NAV ─────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      border-bottom: 1px solid var(--border);
      background: rgba(9,9,11,0.88);
      backdrop-filter: blur(14px);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--dark-100);
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: -0.02em;
    }

    .nav-logo-mark {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .nav-back {
      color: var(--dark-300);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-back:hover { color: var(--dark-100); }

    /* ─── MAIN ────────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8rem 1.5rem 4rem;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      border-radius: 999px;
      border: 1px solid rgba(232,85,58,0.30);
      background: rgba(232,85,58,0.08);
      color: var(--brand-300);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand);
      animation: pulse 2.2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    h1 {
      font-size: clamp(2.25rem, 5vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      max-width: 700px;
      margin-bottom: 1.25rem;
    }

    h1 .accent {
      background: linear-gradient(135deg, var(--brand-300) 0%, var(--brand) 60%, var(--brand-600) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      color: var(--dark-400);
      max-width: 420px;
      margin-bottom: 3.5rem;
    }

    /* ─── FLIP CLOCK ──────────────────────────────────────── */
    .flip-clock {
      display: flex;
      align-items: flex-start;
      gap: 0;
    }

    .flip-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .flip-digits {
      display: flex;
      gap: 4px;
    }

    .flip-sep {
      display: flex;
      align-items: center;
      padding: 0 10px;
      height: var(--card-h);
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem;
      font-weight: 500;
      color: var(--dark-600);
      line-height: 1;
      padding-bottom: 4px; /* optical alignment */
    }

    .flip-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dark-500);
    }

    /* ─── FLIP DIGIT CARD ─────────────────────────────────── */
    .flip-digit {
      position: relative;
      width: var(--card-w);
      height: var(--card-h);
      perspective: 400px;
    }

    /* Shared half-card styles */
    .card-top,
    .card-bottom,
    .card-flap-top,
    .card-flap-bottom {
      position: absolute;
      left: 0; right: 0;
      height: calc(var(--card-h) / 2);
      overflow: hidden;
    }

    /* TOP halves */
    .card-top,
    .card-flap-top {
      top: 0;
      border-radius: 7px 7px 2px 2px;
      background: var(--dark-700);
      border: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(0,0,0,0.5);
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    /* BOTTOM halves */
    .card-bottom,
    .card-flap-bottom {
      bottom: 0;
      border-radius: 2px 2px 7px 7px;
      background: var(--dark-800);
      border: 1px solid rgba(255,255,255,0.04);
      border-top: 1px solid rgba(0,0,0,0.5);
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    /* The digit spans — full card height, clipped by half-height parent */
    .card-top span,
    .card-flap-top span {
      display: block;
      height: var(--card-h);
      line-height: var(--card-h);
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--card-font);
      font-weight: 500;
      color: var(--dark-100);
      user-select: none;
    }

    .card-bottom span,
    .card-flap-bottom span {
      display: block;
      height: var(--card-h);
      line-height: var(--card-h);
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--card-font);
      font-weight: 500;
      color: var(--dark-200);
      /* offset upward so the bottom half of the digit aligns */
      margin-top: calc(var(--card-h) / -2);
      user-select: none;
    }

    /* Center fold shadow line */
    .card-fold {
      position: absolute;
      top: calc(50% - 1px);
      left: 0; right: 0;
      height: 2px;
      background: rgba(0,0,0,0.7);
      z-index: 10;
      pointer-events: none;
    }

    /* ─── ANIMATED FLAPS ──────────────────────────────────── */
    .card-flap-top {
      transform-origin: bottom center;
      z-index: 3;
    }

    .card-flap-bottom {
      transform-origin: top center;
      z-index: 3;
      transform: rotateX(90deg); /* hidden by default */
    }

    /* Animate when .flip class is added */
    .flip-digit.flip .card-flap-top {
      animation: flapTop 0.28s cubic-bezier(0.55, 0, 1, 0.45) forwards;
    }

    .flip-digit.flip .card-flap-bottom {
      animation: flapBottom 0.28s cubic-bezier(0, 0.55, 0.45, 1) 0.28s forwards;
    }

    @keyframes flapTop {
      0%   { transform: rotateX(0deg); }
      100% { transform: rotateX(-90deg); }
    }

    @keyframes flapBottom {
      0%   { transform: rotateX(90deg); }
      100% { transform: rotateX(0deg); }
    }

    /* ─── FOOTER ──────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    .footer-logo {
      font-weight: 600;
      font-size: 0.875rem;
      letter-spacing: -0.02em;
      color: var(--dark-400);
    }

    .footer-copy {
      font-size: 0.8rem;
      color: var(--dark-500);
    }

    /* ─── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 640px) {
      nav { padding: 0 1.25rem; }

      :root {
        --card-w: 46px;
        --card-h: 66px;
        --card-font: 2.2rem;
      }

      .flip-sep {
        padding: 0 6px;
        font-size: 1.5rem;
      }

      footer { justify-content: center; text-align: center; }
    }

    @media (max-width: 380px) {
      :root {
        --card-w: 38px;
        --card-h: 56px;
        --card-font: 1.8rem;
      }

      .flip-sep { padding: 0 4px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="https://tradewindlabs.xyz" class="nav-logo">
      <div class="nav-logo-mark">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="30 30 140 140" width="36" height="36" aria-hidden="true">
          <defs>
            <marker id="nav-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
              <path d="M2 2L8 5L2 8" fill="none" stroke="#E8553A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </marker>
            <marker id="nav-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
              <path d="M2 2L8 5L2 8" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </marker>
          </defs>
          <circle cx="100" cy="100" r="58" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
          <circle cx="65" cy="72" r="26" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <circle cx="65" cy="72" r="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
          <circle cx="65" cy="72" r="7" fill="#E8553A"/>
          <circle cx="135" cy="128" r="26" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <circle cx="135" cy="128" r="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
          <circle cx="135" cy="128" r="7" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
          <path d="M80 66 Q130 44 130 112" fill="none" stroke="#E8553A" stroke-width="3" stroke-linecap="round" marker-end="url(#nav-a)"/>
          <path d="M120 134 Q70 156 70 88" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round" marker-end="url(#nav-b)"/>
        </svg>
      </div>
      TradeWind Market
    </a>
    <a href="https://tradewindlabs.xyz" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M11.5 7H2.5M6.5 3L2.5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      TradeWind Labs
    </a>
  </nav>

  <!-- MAIN -->
  <main>
    <div class="badge">
      <span class="badge-dot"></span>
      Coming soon
    </div>

    <h1>The <span class="accent">marketplace</span><br />is almost ready</h1>

    <p class="sub">
      Peer-to-peer trade. Crypto payments. No accounts, no KYC, no surveillance.
    </p>

    <!-- FLIP CLOCK -->
    <div class="flip-clock" id="clock" aria-label="Countdown timer" role="timer">

      <!-- DAYS -->
      <div class="flip-unit">
        <div class="flip-digits" id="unit-days"></div>
        <span class="flip-label">Days</span>
      </div>

      <div class="flip-sep" aria-hidden="true">:</div>

      <!-- HOURS -->
      <div class="flip-unit">
        <div class="flip-digits" id="unit-hours"></div>
        <span class="flip-label">Hrs</span>
      </div>

      <div class="flip-sep" aria-hidden="true">:</div>

      <!-- MINUTES -->
      <div class="flip-unit">
        <div class="flip-digits" id="unit-minutes"></div>
        <span class="flip-label">Min</span>
      </div>

      <div class="flip-sep" aria-hidden="true">:</div>

      <!-- SECONDS -->
      <div class="flip-unit">
        <div class="flip-digits" id="unit-seconds"></div>
        <span class="flip-label">Sec</span>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <span class="footer-logo">TradeWind Market</span>
    <span class="footer-copy">&copy; 2026 TradeWind Labs. All rights reserved.</span>
  </footer>

  <script>
    // ── CONFIG ────────────────────────────────────────────────
    // Change this to your actual launch date/time (ISO 8601, local time)
    const TARGET_DATE = new Date('2026-05-01T00:00:00');

    // ── DIGIT CARD ────────────────────────────────────────────
    function createDigitCard() {
      const el = document.createElement('div');
      el.className = 'flip-digit';
      el.innerHTML = `
        <div class="card-top"><span></span></div>
        <div class="card-bottom"><span></span></div>
        <div class="card-flap-top"><span></span></div>
        <div class="card-flap-bottom"><span></span></div>
        <div class="card-fold"></div>
      `;
      el._current = null;
      el._animating = false;
      return el;
    }

    function setDigit(card, newChar) {
      if (card._current === newChar) return;

      const oldChar = card._current;
      card._current = newChar;

      // Update static visible card immediately (shows through when flap lifts)
      card.querySelector('.card-top span').textContent = newChar;
      card.querySelector('.card-bottom span').textContent = newChar;

      if (oldChar === null) return; // initial render — no animation

      // Set flap content: top flap shows old value flying away, bottom flap shows new value arriving
      card.querySelector('.card-flap-top span').textContent = oldChar;
      card.querySelector('.card-flap-bottom span').textContent = newChar;

      // Restart animation
      card.classList.remove('flip');
      void card.offsetWidth; // force reflow
      card.classList.add('flip');

      // Clean up class after animation completes
      setTimeout(() => card.classList.remove('flip'), 700);
    }

    // ── UNIT BUILDER ─────────────────────────────────────────
    function buildUnit(containerId, numDigits) {
      const container = document.getElementById(containerId);
      const cards = [];
      for (let i = 0; i < numDigits; i++) {
        const card = createDigitCard();
        container.appendChild(card);
        cards.push(card);
      }
      return cards;
    }

    function updateUnit(cards, value, digits) {
      const str = String(Math.max(0, value)).padStart(digits, '0').slice(-digits);
      for (let i = 0; i < digits; i++) {
        setDigit(cards[i], str[i]);
      }
    }

    // ── INIT ─────────────────────────────────────────────────
    const daysCards    = buildUnit('unit-days',    3);
    const hoursCards   = buildUnit('unit-hours',   2);
    const minutesCards = buildUnit('unit-minutes', 2);
    const secondsCards = buildUnit('unit-seconds', 2);

    function tick() {
      const now  = Date.now();
      const diff = Math.max(0, TARGET_DATE.getTime() - now);

      const totalSecs = Math.floor(diff / 1000);
      const secs  = totalSecs % 60;
      const mins  = Math.floor(totalSecs / 60) % 60;
      const hours = Math.floor(totalSecs / 3600) % 24;
      const days  = Math.floor(totalSecs / 86400);

      updateUnit(daysCards,    days,  3);
      updateUnit(hoursCards,   hours, 2);
      updateUnit(minutesCards, mins,  2);
      updateUnit(secondsCards, secs,  2);
    }

    // Render immediately, then every second
    tick();
    setInterval(tick, 1000);
  </script>

</body>
</html>
