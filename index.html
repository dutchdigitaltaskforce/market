<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>TradeWind Market - Coming Soon</title>
  <meta name="description" content="The privacy-first P2P marketplace. Coming soon." />
  <meta property="og:title" content="TradeWind Market - Coming Soon" />
  <meta property="og:description" content="Buy and sell with crypto. No accounts. No surveillance." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark-950: #09090B;
      --dark-900: #0F0F12;
      --dark-800: #17171C;
      --dark-700: #222228;
      --dark-600: #2E2E36;
      --dark-500: #3F3F48;
      --dark-400: #62626D;
      --dark-300: #8C8C96;
      --dark-200: #B5B5BD;
      --dark-100: #DCDCE0;

      --brand:     #E8553A;
      --brand-400: #F2724A;
      --brand-600: #D04328;
      --brand-300: #F5956E;

      --border:    rgba(255,255,255,0.06);
      --border-h:  rgba(255,255,255,0.10);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--dark-950);
      color: var(--dark-100);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── NAV ─────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 64px;
      border-bottom: 1px solid var(--border);
      background: rgba(9,9,11,0.88);
      backdrop-filter: blur(14px);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--dark-100);
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: -0.02em;
    }

    .nav-logo-mark {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .nav-back {
      color: var(--dark-300);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-back:hover { color: var(--dark-100); }

    /* ─── MAIN ────────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8rem 1.5rem 4rem;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 14px;
      border-radius: 999px;
      border: 1px solid rgba(232,85,58,0.30);
      background: rgba(232,85,58,0.08);
      color: var(--brand-300);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand);
      animation: pulse 2.2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    h1 {
      font-size: clamp(2.25rem, 5vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      max-width: 700px;
      margin-bottom: 1.25rem;
    }

    h1 .accent {
      background: linear-gradient(135deg, var(--brand-300) 0%, var(--brand) 60%, var(--brand-600) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      color: var(--dark-400);
      max-width: 420px;
      margin-bottom: 3.5rem;
    }

    /* ─── FLIP CLOCK ──────────────────────────────────────── */
    .flip-clock {
      text-align: center;
      perspective: 400px;
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
    }

    .flip-clock__piece {
      display: inline-block;
      margin: 0 8px;
    }

    .flip-clock__slot {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dark-500);
      display: block;
      text-align: center;
      margin-top: 10px;
    }

    .card {
      display: block;
      position: relative;
      padding-bottom: 0.72em;
      font-size: clamp(2.6rem, 6vw, 4.5rem);
      line-height: 0.95;
    }

    .card__top,
    .card__bottom,
    .card__back::before,
    .card__back::after {
      display: block;
      height: 0.72em;
      color: var(--dark-200);
      background: var(--dark-700);
      padding: 0.25em 0.25em;
      border-radius: 0.15em 0.15em 0 0;
      backface-visibility: hidden;
      transform-style: preserve-3d;
      width: 1.8em;
      transform: translateZ(0);
    }

    .card__bottom {
      color: var(--dark-100);
      position: absolute;
      top: 50%;
      left: 0;
      border-top: solid 1px rgba(0,0,0,0.5);
      background: var(--dark-800);
      border-radius: 0 0 0.15em 0.15em;
      pointer-events: none;
      overflow: hidden;
    }

    .card__bottom::after {
      display: block;
      margin-top: -0.72em;
    }

    .card__back::before,
    .card__bottom::after {
      content: attr(data-value);
    }

    .card__back {
      position: absolute;
      top: 0;
      height: 100%;
      left: 0;
      pointer-events: none;
    }

    .card__back::before {
      position: relative;
      z-index: -1;
      overflow: hidden;
    }

    .flip .card__back::before {
      animation: flipTop 0.3s cubic-bezier(.37,.01,.94,.35);
      animation-fill-mode: both;
      transform-origin: center bottom;
    }

    .flip .card__back .card__bottom {
      transform-origin: center top;
      animation-fill-mode: both;
      animation: flipBottom 0.6s cubic-bezier(.15,.45,.28,1);
    }

    @keyframes flipTop {
      0%   { transform: rotateX(0deg); z-index: 2; }
      0%, 99% { opacity: 0.99; }
      100% { transform: rotateX(-90deg); opacity: 0; }
    }

    @keyframes flipBottom {
      0%, 50% { z-index: -1; transform: rotateX(90deg); opacity: 0; }
      51%      { opacity: 0.99; }
      100%     { opacity: 0.99; transform: rotateX(0deg); z-index: 5; }
    }

    /* ─── FOOTER ──────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    .footer-logo {
      font-weight: 600;
      font-size: 0.875rem;
      letter-spacing: -0.02em;
      color: var(--dark-400);
    }

    .footer-copy {
      font-size: 0.8rem;
      color: var(--dark-500);
    }

    /* ─── RESPONSIVE ──────────────────────────────────────── */
    @media (max-width: 640px) {
      nav { padding: 0 1.25rem; }
      .card { font-size: clamp(2rem, 8vw, 3rem); }
      .flip-clock__piece { margin: 0 4px; }
      footer { justify-content: center; text-align: center; }
    }

    @media (max-width: 380px) {
      .card { font-size: 1.8rem; }
      .flip-clock__piece { margin: 0 2px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="https://tradewindlabs.xyz" class="nav-logo">
      <div class="nav-logo-mark">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="30 30 140 140" width="36" height="36" aria-hidden="true">
          <defs>
            <marker id="nav-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
              <path d="M2 2L8 5L2 8" fill="none" stroke="#E8553A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </marker>
            <marker id="nav-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
              <path d="M2 2L8 5L2 8" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </marker>
          </defs>
          <circle cx="100" cy="100" r="58" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
          <circle cx="65" cy="72" r="26" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <circle cx="65" cy="72" r="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
          <circle cx="65" cy="72" r="7" fill="#E8553A"/>
          <circle cx="135" cy="128" r="26" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
          <circle cx="135" cy="128" r="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
          <circle cx="135" cy="128" r="7" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
          <path d="M80 66 Q130 44 130 112" fill="none" stroke="#E8553A" stroke-width="3" stroke-linecap="round" marker-end="url(#nav-a)"/>
          <path d="M120 134 Q70 156 70 88" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round" marker-end="url(#nav-b)"/>
        </svg>
      </div>
      TradeWind Market
    </a>
    <a href="https://tradewindlabs.xyz" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M11.5 7H2.5M6.5 3L2.5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      TradeWind Labs
    </a>
  </nav>

  <!-- MAIN -->
  <main>
    <div class="badge">
      <span class="badge-dot"></span>
      Coming soon
    </div>

    <h1>The <span class="accent">marketplace</span><br />is almost ready</h1>

    <p class="sub">
      Sell your stuff. We don't care.
    </p>

    <!-- FLIP CLOCK -->
    <div id="clock-container" aria-label="Countdown timer" role="timer"></div>
  </main>

  <!-- FOOTER -->
  <footer>
    <span class="footer-logo">TradeWind Market</span>
    <span class="footer-copy">&copy; 2026 TradeWind Labs. All rights reserved.</span>
  </footer>

  <script>
    // ── CONFIG ────────────────────────────────────────────────
    var TARGET_DATE = '2026-06-01T00:00:00';

    // ── FLIP CLOCK (logic from iannuttall/b272ced6fb8affaed867e5f3971720fa) ──
    function CountdownTracker(label, value) {
      var el = document.createElement('span');
      el.className = 'flip-clock__piece';
      el.innerHTML =
        '<b class="flip-clock__card card">' +
          '<b class="card__top"></b>' +
          '<b class="card__bottom"></b>' +
          '<b class="card__back"><b class="card__bottom"></b></b>' +
        '</b>' +
        '<span class="flip-clock__slot">' + label + '</span>';
      this.el = el;

      var top       = el.querySelector('.card__top'),
          bottom    = el.querySelector('.card__bottom'),
          back      = el.querySelector('.card__back'),
          backBottom = el.querySelector('.card__back .card__bottom');

      this.update = function(val) {
        val = ('0' + val).slice(-2);
        if (val !== this.currentValue) {
          if (this.currentValue >= 0) {
            back.setAttribute('data-value', this.currentValue);
            bottom.setAttribute('data-value', this.currentValue);
          }
          this.currentValue = val;
          top.innerText = this.currentValue;
          backBottom.setAttribute('data-value', this.currentValue);
          this.el.classList.remove('flip');
          void this.el.offsetWidth;
          this.el.classList.add('flip');
        }
      };
      this.update(value);
    }

    function getTimeRemaining(endtime) {
      var t = Date.parse(endtime) - Date.parse(new Date());
      return {
        'Total':   t,
        'Days':    Math.floor(t / (1000 * 60 * 60 * 24)),
        'Hours':   Math.floor((t / (1000 * 60 * 60)) % 24),
        'Minutes': Math.floor((t / 1000 / 60) % 60),
        'Seconds': Math.floor((t / 1000) % 60)
      };
    }

    function Clock(countdown, callback) {
      countdown = countdown ? new Date(Date.parse(countdown)) : false;
      callback  = callback || function() {};
      var updateFn = getTimeRemaining;
      this.el = document.createElement('div');
      this.el.className = 'flip-clock';

      var trackers = {},
          t = updateFn(countdown),
          key, timeinterval;

      for (key in t) {
        if (key === 'Total') { continue; }
        trackers[key] = new CountdownTracker(key, t[key]);
        this.el.appendChild(trackers[key].el);
      }

      function updateClock() {
        timeinterval = requestAnimationFrame(updateClock);
        var now = updateFn(countdown);
        if (now.Total < 0) {
          cancelAnimationFrame(timeinterval);
          for (key in trackers) { trackers[key].update(0); }
          callback();
          return;
        }
        for (key in trackers) { trackers[key].update(now[key]); }
      }
      setTimeout(updateClock, 500);
    }

    // ── INIT ─────────────────────────────────────────────────
    var clock = new Clock(TARGET_DATE);
    document.getElementById('clock-container').appendChild(clock.el);
  </script>

</body>
</html>
